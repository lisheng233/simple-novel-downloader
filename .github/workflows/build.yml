name: Build Executables

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: false
        default: 'manual-build'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows (仅支持 x64，因为 x86 Python 3.12 可能不可用)
          - os: windows-2019
            arch: x64
            python_version: '3.12'
            artifact_name: novel-downloader-windows-x64.exe
            asset_name: novel-downloader-windows-x64.exe
          
          # Ubuntu 22.04 LTS
          - os: ubuntu-22.04
            arch: x64
            python_version: '3.12'
            artifact_name: novel-downloader-linux-x64
            asset_name: novel-downloader-linux-x64
          
          # Ubuntu 22.04 ARM64
          - os: ubuntu-22.04-arm64
            arch: arm64
            python_version: '3.12'
            artifact_name: novel-downloader-linux-arm64
            asset_name: novel-downloader-linux-arm64
          
          # Ubuntu 22.04 ARM32 - 使用 Python 3.10 以获得更好的兼容性
          - os: ubuntu-22.04-arm64
            arch: arm32
            python_version: '3.10'
            artifact_name: novel-downloader-linux-arm32
            asset_name: novel-downloader-linux-arm32
          
          # macOS (Intel)
          - os: macos-13
            arch: x64
            python_version: '3.12'
            artifact_name: novel-downloader-macos-x64
            asset_name: novel-downloader-macos-x64
          
          # macOS (Apple Silicon)
          - os: macos-14
            arch: arm64
            python_version: '3.12'
            artifact_name: novel-downloader-macos-arm64
            asset_name: novel-downloader-macos-arm64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests beautifulsoup4 ebooklib
      
      - name: Build executable
        run: |
          pyinstaller --onefile \
            --name "${{ matrix.artifact_name }}" \
            --add-data "README.md:." \
            --add-data "LICENSE:." \
            --console \
            --clean \
            --noconfirm \
            main.py
        shell: |
          ${{ startsWith(matrix.os, 'windows') && 'pwsh' || 'bash' }}
      
      - name: List dist directory
        run: ls -la dist/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}*
          if-no-files-found: error
          retention-days: 30
