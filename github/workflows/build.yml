name: Build Executables

on:
  workflow_dispatch:  # 允许手动触发
    inputs:
      version:
        description: '版本号'
        required: false
        default: 'manual-build'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: novel-downloader-windows.exe
            asset_name: novel-downloader-windows.exe
          - os: ubuntu-latest
            artifact_name: novel-downloader-linux
            asset_name: novel-downloader-linux
          # 如果需要macOS版本，取消下面的注释
          # - os: macos-latest
          #   artifact_name: novel-downloader-macos
          #   asset_name: novel-downloader-macos
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install requests beautifulsoup4
          # 如果不需要EPUB功能，可以注释掉ebooklib
          pip install ebooklib
      
      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile `
            --name "novel-downloader-windows" `
            --add-data "README.md;." `
            --add-data "LICENSE;." `
            --console `
            --clean `
            --noconfirm `
            dl2.py
      
      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile \
            --name "novel-downloader-linux" \
            --add-data "README.md:." \
            --add-data "LICENSE:." \
            --console \
            --clean \
            --noconfirm \
            dl2.py
      
      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile \
            --name "novel-downloader-macos" \
            --add-data "README.md:." \
            --add-data "LICENSE:." \
            --console \
            --clean \
            --noconfirm \
            dl2.py
      
      - name: List dist directory
        run: ls -la dist/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 30

  # 创建合并的merger.py构建任务
  build-merger:
    name: Build Merger on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: novel-merger-windows.exe
            asset_name: novel-merger-windows.exe
          - os: ubuntu-latest
            artifact_name: novel-merger-linux
            asset_name: novel-merger-linux
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install ebooklib
      
      - name: Build Merger with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile `
            --name "novel-merger-windows" `
            --add-data "README.md;." `
            --add-data "LICENSE;." `
            --console `
            --clean `
            --noconfirm `
            merger.py
      
      - name: Build Merger with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile \
            --name "novel-merger-linux" \
            --add-data "README.md:." \
            --add-data "LICENSE:." \
            --console \
            --clean \
            --noconfirm \
            merger.py
      
      - name: List dist directory
        run: ls -la dist/
      
      - name: Upload merger artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 30
